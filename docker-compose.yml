services:
  postgres:
    image: postgres:16-alpine
    container_name: organic_market_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-market_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: organic_market_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: http://localhost:4173
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-market_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_TO: ${SMTP_TO}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: organic_market_frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
